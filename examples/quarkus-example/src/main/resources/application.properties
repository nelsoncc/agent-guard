# =============================================================================
# Agent Guard — Quarkus Example Configuration
# =============================================================================
quarkus.application.name=agent-guard-quarkus-example
# ── Agent Guard ───────────────────────────────────────────────────────────────
agent-guard.enabled=true
agent-guard.service-name=quarkus-example-agent
agent-guard.fail-safe=FAIL_CLOSED
agent-guard.budget.per-run-usd=0.50
agent-guard.budget.per-hour-usd=2.00
agent-guard.loop.max-repeats=3
agent-guard.loop.window-size=10
agent-guard.loop.backoff=true
agent-guard.loop.semantic=false
agent-guard.tool-policy.default=BLOCKED
agent-guard.tool-policy.allow=web_search,read_file,calculator
agent-guard.tool-policy.require-consent=send_email
agent-guard.tool-policy.deny=delete_all,wipe_database
agent-guard.injection.enabled=true
agent-guard.injection.enforce=true
# ── Native image hints ────────────────────────────────────────────────────────
# quarkus.native.additional-build-args=\
#   --initialize-at-build-time=io.agentguard.runtime.InjectionGuard
# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.category."io.agentguard".level=INFO
