# =============================================================================
# Agent Guard — Spring Boot Example Configuration
# =============================================================================
spring.application.name=agent-guard-spring-example
# ── Agent Guard ───────────────────────────────────────────────────────────────
agent-guard.enabled=true
agent-guard.service-name=spring-example-agent
agent-guard.fail-safe=FAIL_CLOSED
# Budget: $0.50 per agent run, $2.00 per hour rolling window
agent-guard.budget.per-run-usd=0.50
agent-guard.budget.per-hour-usd=2.00
# Loop detection: block after 3 identical calls within last 10
agent-guard.loop.max-repeats=3
agent-guard.loop.window-size=10
agent-guard.loop.backoff=true
# Tool policy: deny-all default; explicitly allow safe tools
agent-guard.tool-policy.default=BLOCKED
agent-guard.tool-policy.allow=web_search,read_file,get_weather,calculator
agent-guard.tool-policy.require-consent=send_email,create_github_issue
agent-guard.tool-policy.deny=delete_all,wipe_database,execute_shell
# Injection guard: enforce mode (blocks on detection)
agent-guard.injection.enabled=true
agent-guard.injection.enforce=true
# OTel metrics
agent-guard.otel.enabled=true
# ── LangChain4j (real LLM - set your key) ────────────────────────────────────
# langchain4j.openai.api-key=${OPENAI_API_KEY}
# langchain4j.openai.model-name=gpt-4o-mini
# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.io.agentguard=INFO
